<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>📈 Биржевой Трейдер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            padding: 10px;
            touch-action: manipulation;
        }
        .game-container {
            background: linear-gradient(180deg, #0f1a2e, #0a0f1f);
            border-radius: 16px;
            padding: 15px;
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(100,200,255,0.08);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-height: 98vh;
            overflow-y: auto;
        }
        .game-container::-webkit-scrollbar { width: 3px; }
        .game-container::-webkit-scrollbar-thumb { background: rgba(100,200,255,0.1); border-radius: 2px; }

        .header {
            text-align: center;
            padding: 8px;
            border-bottom: 1px solid rgba(100,200,255,0.08);
            margin-bottom: 12px;
            position: sticky;
            top: 0;
            background: #0f1a2e;
            z-index: 10;
            padding-top: 4px;
        }
        .header h1 {
            font-size: 22px;
            background: linear-gradient(135deg, #00d4ff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .header .subtitle {
            font-size: 11px;
            color: #667799;
            -webkit-text-fill-color: #667799;
        }
        .balance {
            background: rgba(0,255,100,0.06);
            border: 1px solid rgba(0,255,100,0.1);
            border-radius: 10px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .balance .label {
            font-size: 12px;
            color: #8899bb;
        }
        .balance .value {
            font-size: 22px;
            font-weight: bold;
            color: #00ff88;
        }
        .balance .value.red {
            color: #ff4455;
        }

        .stats {
            display: flex;
            gap: 8px;
            margin: 6px 0 10px 0;
            flex-wrap: wrap;
        }
        .stats .stat-item {
            flex: 1;
            min-width: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 6px 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .stats .stat-item .label {
            font-size: 9px;
            color: #667799;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stats .stat-item .value {
            font-size: 14px;
            font-weight: bold;
        }
        .stats .stat-item .value.green { color: #00ff88; }
        .stats .stat-item .value.red { color: #ff4455; }

        .assets-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 10px 0;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .assets-grid::-webkit-scrollbar { width: 3px; }
        .assets-grid::-webkit-scrollbar-thumb { background: rgba(100,200,255,0.1); border-radius: 2px; }

        .asset-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .asset-card:active {
            transform: scale(0.98);
        }
        .asset-card .icon {
            font-size: 28px;
            width: 40px;
            text-align: center;
        }
        .asset-card .info {
            flex: 1;
            min-width: 0;
        }
        .asset-card .info .name {
            font-size: 14px;
            font-weight: bold;
        }
        .asset-card .info .holdings {
            font-size: 10px;
            color: #667799;
        }
        .asset-card .price-info {
            text-align: right;
            min-width: 80px;
        }
        .asset-card .price-info .price {
            font-size: 16px;
            font-weight: bold;
        }
        .asset-card .price-info .change {
            font-size: 12px;
            font-weight: bold;
        }
        .asset-card .price-info .change.up {
            color: #00ff88;
        }
        .asset-card .price-info .change.down {
            color: #ff4455;
        }
        .asset-card .mini-chart {
            width: 50px;
            height: 30px;
            margin-left: 8px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #0f1a2e;
            border-radius: 16px;
            padding: 20px;
            max-width: 420px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(100,200,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .modal .modal-header h2 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal .modal-header .close {
            background: none;
            border: none;
            color: #667799;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
        }
        .modal .modal-header .close:hover {
            color: #fff;
        }

        .modal .chart-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            position: relative;
            height: 180px;
        }
        .modal .chart-container canvas {
            width: 100%;
            height: 100%;
        }

        .modal .price-info {
            display: flex;
            justify-content: space-between;
            padding: 8px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 8px;
        }
        .modal .price-info .current-price {
            font-size: 24px;
            font-weight: bold;
        }
        .modal .price-info .current-change {
            font-size: 18px;
            font-weight: bold;
        }
        .modal .price-info .current-change.up { color: #00ff88; }
        .modal .price-info .current-change.down { color: #ff4455; }

        .modal .holdings-info {
            font-size: 13px;
            color: #8899bb;
            text-align: center;
            margin-bottom: 10px;
        }
        .modal .holdings-info span {
            color: #fff;
            font-weight: bold;
        }

        .modal .modal-input {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 4px;
            margin: 8px 0;
        }
        .modal .modal-input button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            color: #8899bb;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.15s;
            min-width: 40px;
        }
        .modal .modal-input button:active {
            transform: scale(0.9);
        }
        .modal .modal-input button:hover {
            background: rgba(255,255,255,0.08);
        }
        .modal .modal-input input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            padding: 8px;
            outline: none;
            width: 80px;
        }
        .modal .modal-input input::-webkit-outer-spin-button,
        .modal .modal-input input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
        .modal .modal-input input[type=number] {
            -moz-appearance: textfield;
        }

        .modal .quick-amounts {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 6px 0;
        }
        .modal .quick-amounts button {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #8899bb;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.15s;
        }
        .modal .quick-amounts button:active {
            transform: scale(0.9);
        }
        .modal .quick-amounts button:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .modal .total-cost {
            text-align: center;
            font-size: 13px;
            color: #8899bb;
            margin: 6px 0;
        }
        .modal .total-cost span {
            color: #ffcc00;
            font-weight: bold;
        }

        .modal .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .modal .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.5px;
        }
        .modal .modal-actions button:active {
            transform: scale(0.94);
        }
        .modal .modal-actions .btn-buy {
            background: linear-gradient(135deg, #00b894, #00a86b);
            color: white;
        }
        .modal .modal-actions .btn-buy:hover {
            box-shadow: 0 4px 20px rgba(0,200,100,0.2);
        }
        .modal .modal-actions .btn-sell {
            background: linear-gradient(135deg, #e17055, #d63031);
            color: white;
        }
        .modal .modal-actions .btn-sell:hover {
            box-shadow: 0 4px 20px rgba(225,112,85,0.2);
        }
        .modal .modal-actions .btn-buy:disabled,
        .modal .modal-actions .btn-sell:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: none;
        }
        .modal .modal-actions .btn-buy:disabled:hover,
        .modal .modal-actions .btn-sell:disabled:hover {
            box-shadow: none;
        }

        .message {
            text-align: center;
            padding: 6px 10px;
            border-radius: 8px;
            margin: 6px 0;
            font-weight: bold;
            font-size: 12px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
        }
        .message.success {
            background: rgba(0,255,100,0.08);
            color: #00ff88;
            border-color: rgba(0,255,100,0.1);
        }
        .message.danger {
            background: rgba(255,50,50,0.08);
            color: #ff4455;
            border-color: rgba(255,50,50,0.1);
        }
        .message.info {
            background: rgba(100,200,255,0.04);
            color: #66d9ff;
            border-color: rgba(100,200,255,0.05);
        }
        .message.warning {
            background: rgba(255,200,0,0.04);
            color: #ffcc00;
            border-color: rgba(255,200,0,0.06);
        }

        .history {
            max-height: 80px;
            overflow-y: auto;
            margin-top: 6px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 11px;
            border: 1px solid rgba(100,200,255,0.05);
        }
        .history-item {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-between;
        }
        .history-item .win { color: #00ff88; }
        .history-item .lose { color: #ff4455; }

        .reset-btn {
            background: rgba(255,50,50,0.06);
            border: 1px solid rgba(255,50,50,0.1);
            color: #ff4455;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 4px;
            transition: 0.15s;
            width: 100%;
        }
        .reset-btn:hover {
            background: rgba(255,50,50,0.12);
        }

        @media (max-width: 450px) {
            .game-container { padding: 10px; }
            .modal { padding: 16px; }
            .asset-card { padding: 8px 10px; gap: 8px; }
            .asset-card .icon { font-size: 22px; width: 32px; }
            .modal .chart-container { height: 150px; }
            .stats .stat-item .value { font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>📈 БИРЖЕВОЙ ТРЕЙДЕР</h1>
        <div class="subtitle">Покупай акции и криптовалюту</div>
        <div class="balance">
            <span class="label">💰 Баланс</span>
            <span class="value" id="balanceDisplay">1000.00</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="label">Инвестировано</div>
            <div class="value green" id="investedDisplay">0.00</div>
        </div>
        <div class="stat-item">
            <div class="label">Портфель</div>
            <div class="value" id="portfolioDisplay">0.00</div>
        </div>
        <div class="stat-item">
            <div class="label">Прибыль</div>
            <div class="value green" id="profitDisplay">0.00</div>
        </div>
    </div>

    <div class="assets-grid" id="assetsGrid"></div>

    <div class="message info" id="messageDisplay">💡 Выбери актив для просмотра графика</div>

    <div class="history" id="historyDisplay">
        <div style="color:#556688; text-align:center; font-size:11px;">📋 История сделок</div>
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 Сбросить прогресс</button>
</div>

<!-- Модальное окно с графиком -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">📊 Актив</h2>
            <button class="close" onclick="closeModal()">✕</button>
        </div>

        <div class="price-info">
            <div>
                <div style="font-size:12px; color:#667799;">Текущая цена</div>
                <div class="current-price" id="modalPrice">0.00</div>
            </div>
            <div style="text-align:right;">
                <div style="font-size:12px; color:#667799;">Изменение</div>
                <div class="current-change" id="modalChange">+0.00%</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="chartCanvas"></canvas>
        </div>

        <div class="holdings-info">
            📦 У вас: <span id="modalHoldings">0</span> шт. на сумму <span id="modalHoldingsValue">0.00</span>
        </div>

        <div class="modal-input">
            <button onclick="changeAmount(-1)">−</button>
            <input type="number" id="modalAmount" value="1" min="0.01" step="0.01">
            <button onclick="changeAmount(1)">+</button>
        </div>

        <div class="quick-amounts">
            <button onclick="setQuickAmount(0.1)">0.1</button>
            <button onclick="setQuickAmount(0.5)">0.5</button>
            <button onclick="setQuickAmount(1)">1</button>
            <button onclick="setQuickAmount(5)">5</button>
            <button onclick="setQuickAmount(10)">10</button>
            <button onclick="setMaxAmount()">Макс</button>
        </div>

        <div class="total-cost">
            Стоимость: <span id="modalTotalCost">0.00</span>
        </div>

        <div class="modal-actions">
            <button class="btn-buy" id="buyBtn" onclick="buyAsset()">📈 КУПИТЬ</button>
            <button class="btn-sell" id="sellBtn" onclick="sellAsset()">📉 ПРОДАТЬ</button>
        </div>
    </div>
</div>

<script>
// ============================================================
//  📈 БИРЖЕВОЙ ТРЕЙДЕР v2.0
//  • Новые активы: Samsung, Notcoin, EUR, GBP
//  • Понятный интерфейс
//  • Графики и статистика
// ============================================================

// ---------- АКТИВЫ ----------
const ASSETS = [
    // Криптовалюты
    { id: 'btc', icon: '₿', name: 'Bitcoin', color: '#f7931a', minPrice: 40000, maxPrice: 70000, type: 'Криптовалюта' },
    { id: 'eth', icon: '⟠', name: 'Ethereum', color: '#627eea', minPrice: 2000, maxPrice: 4000, type: 'Криптовалюта' },
    { id: 'sol', icon: '◎', name: 'Solana', color: '#9945ff', minPrice: 80, maxPrice: 200, type: 'Криптовалюта' },
    { id: 'not', icon: '🪙', name: 'Notcoin', color: '#ff6b35', minPrice: 0.005, maxPrice: 0.05, type: 'Криптовалюта' },
    // Акции
    { id: 'aapl', icon: '🍎', name: 'Apple', color: '#555555', minPrice: 150, maxPrice: 250, type: 'Акция' },
    { id: 'googl', icon: '🔵', name: 'Google', color: '#4285f4', minPrice: 120, maxPrice: 200, type: 'Акция' },
    { id: 'tsla', icon: '🚗', name: 'Tesla', color: '#cc0000', minPrice: 200, maxPrice: 400, type: 'Акция' },
    { id: 'samsung', icon: '📱', name: 'Samsung', color: '#1428a0', minPrice: 50, maxPrice: 100, type: 'Акция' },
    // Валюты
    { id: 'eur', icon: '💶', name: 'EUR/USD', color: '#0052b4', minPrice: 1.05, maxPrice: 1.15, type: 'Валюта' },
    { id: 'gbp', icon: '💷', name: 'GBP/USD', color: '#d00000', minPrice: 1.20, maxPrice: 1.35, type: 'Валюта' }
];

// ---------- СОСТОЯНИЕ ----------
let game = {
    balance: 1000.0,
    holdings: {},
    prices: {},
    priceHistory: {},
    history: [],
    selectedAsset: null,
    totalInvested: 0
};

// ---------- ИНИЦИАЛИЗАЦИЯ ----------
function init() {
    loadGame();
    initPrices();
    renderAssets();
    updateDisplay();
    updateHistory();
    updateStats();
    showMessage('💡 Выбери актив для просмотра графика', 'info');
    startPriceUpdates();
}

function initPrices() {
    ASSETS.forEach(a => {
        if (!game.prices[a.id]) {
            const price = a.minPrice + Math.random() * (a.maxPrice - a.minPrice);
            game.prices[a.id] = Math.round(price * 100) / 100;
        }
        if (!game.priceHistory[a.id]) {
            game.priceHistory[a.id] = [];
            for (let i = 0; i < 30; i++) {
                const p = a.minPrice + Math.random() * (a.maxPrice - a.minPrice);
                game.priceHistory[a.id].push(Math.round(p * 100) / 100);
            }
            game.priceHistory[a.id][29] = game.prices[a.id];
        }
        if (!game.holdings[a.id]) {
            game.holdings[a.id] = 0;
        }
    });
    if (!game.totalInvested) game.totalInvested = 0;
}

// ---------- СОХРАНЕНИЕ ----------
function saveGame() {
    try {
        localStorage.setItem('trader_balance', game.balance);
        localStorage.setItem('trader_holdings', JSON.stringify(game.holdings));
        localStorage.setItem('trader_prices', JSON.stringify(game.prices));
        localStorage.setItem('trader_history', JSON.stringify(game.history));
        localStorage.setItem('trader_price_history', JSON.stringify(game.priceHistory));
        localStorage.setItem('trader_invested', game.totalInvested);
    } catch(e) {}
}

function loadGame() {
    try {
        const balance = localStorage.getItem('trader_balance');
        if (balance !== null) game.balance = parseFloat(balance);
        const holdings = localStorage.getItem('trader_holdings');
        if (holdings !== null) game.holdings = JSON.parse(holdings);
        const prices = localStorage.getItem('trader_prices');
        if (prices !== null) game.prices = JSON.parse(prices);
        const history = localStorage.getItem('trader_history');
        if (history !== null) game.history = JSON.parse(history);
        const priceHistory = localStorage.getItem('trader_price_history');
        if (priceHistory !== null) game.priceHistory = JSON.parse(priceHistory);
        const invested = localStorage.getItem('trader_invested');
        if (invested !== null) game.totalInvested = parseFloat(invested);
    } catch(e) {}
}

// ---------- ОБНОВЛЕНИЕ ЦЕН ----------
let priceUpdateInterval = null;

function startPriceUpdates() {
    priceUpdateInterval = setInterval(() => {
        updatePrices();
        renderAssets();
        updateDisplay();
        updateStats();
        saveGame();
        if (document.getElementById('modalOverlay').classList.contains('active') && game.selectedAsset) {
            updateModal(game.selectedAsset);
        }
    }, 5000);
}

function updatePrices() {
    ASSETS.forEach(a => {
        const currentPrice = game.prices[a.id];
        const change = (Math.random() - 0.5) * 0.04;
        let newPrice = currentPrice * (1 + change);
        newPrice = Math.max(a.minPrice * 0.7, Math.min(a.maxPrice * 1.3, newPrice));
        newPrice = Math.round(newPrice * 100) / 100;
        game.prices[a.id] = newPrice;

        if (!game.priceHistory[a.id]) game.priceHistory[a.id] = [];
        game.priceHistory[a.id].push(newPrice);
        if (game.priceHistory[a.id].length > 50) game.priceHistory[a.id].shift();
    });
}

// ---------- РЕНДЕРИНГ ----------
function renderAssets() {
    const grid = document.getElementById('assetsGrid');
    grid.innerHTML = '';

    // Группируем по типу
    const types = ['Криптовалюта', 'Акция', 'Валюта'];
    types.forEach(type => {
        const items = ASSETS.filter(a => a.type === type);
        if (items.length === 0) return;

        const header = document.createElement('div');
        header.style.cssText = 'color:#667799; font-size:11px; padding:8px 4px 2px 4px; border-bottom:1px solid rgba(255,255,255,0.05); text-transform:uppercase; letter-spacing:1px;';
        header.textContent = '🔄 ' + type + 's';
        grid.appendChild(header);

        items.forEach(a => {
            const price = game.prices[a.id];
            const holdings = game.holdings[a.id] || 0;
            const history = game.priceHistory[a.id] || [price];
            const oldPrice = history.length > 1 ? history[history.length - 2] : price;
            const change = oldPrice !== 0 ? ((price - oldPrice) / oldPrice * 100) : 0;
            const changeClass = change >= 0 ? 'up' : 'down';
            const changeSymbol = change >= 0 ? '+' : '';

            const miniData = history.slice(-15);
            const minVal = Math.min(...miniData);
            const maxVal = Math.max(...miniData);
            const range = maxVal - minVal || 1;
            const points = miniData.map((v, i) => ({
                x: (i / (miniData.length - 1)) * 50,
                y: 30 - ((v - minVal) / range) * 28
            }));

            const card = document.createElement('div');
            card.className = 'asset-card';
            card.onclick = () => openModal(a.id);

            const miniChart = document.createElement('canvas');
            miniChart.className = 'mini-chart';
            miniChart.width = 50;
            miniChart.height = 30;
            const mctx = miniChart.getContext('2d');
            mctx.clearRect(0, 0, 50, 30);

            if (points.length > 1) {
                mctx.beginPath();
                mctx.strokeStyle = change >= 0 ? '#00ff88' : '#ff4455';
                mctx.lineWidth = 1.5;
                mctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    mctx.lineTo(points[i].x, points[i].y);
                }
                mctx.stroke();
            }

            const holdingsValue = holdings * price;

            card.innerHTML = `
                <div class="icon">${a.icon}</div>
                <div class="info">
                    <div class="name" style="color:${a.color}">${a.name}</div>
                    <div class="holdings">${holdings > 0 ? `📦 ${holdings.toFixed(2)} шт. • $${holdingsValue.toFixed(2)}` : 'Нет в портфеле'}</div>
                </div>
                <div class="price-info">
                    <div class="price" style="color:${a.color}">$${price.toFixed(2)}</div>
                    <div class="change ${changeClass}">${changeSymbol}${change.toFixed(2)}%</div>
                </div>
            `;

            const infoDiv = card.querySelector('.price-info');
            infoDiv.appendChild(miniChart);

            grid.appendChild(card);
        });
    });
}

// ---------- ОБНОВЛЕНИЕ ДИСПЛЕЯ ----------
function updateDisplay() {
    document.getElementById('balanceDisplay').textContent = game.balance.toFixed(2);
    const balanceEl = document.getElementById('balanceDisplay');
    balanceEl.className = 'value' + (game.balance < 100 ? ' red' : '');
}

function updateStats() {
    let portfolioValue = 0;
    ASSETS.forEach(a => {
        const holdings = game.holdings[a.id] || 0;
        portfolioValue += holdings * game.prices[a.id];
    });

    document.getElementById('investedDisplay').textContent = game.totalInvested.toFixed(2);
    document.getElementById('portfolioDisplay').textContent = portfolioValue.toFixed(2);
    const profit = portfolioValue - game.totalInvested;
    const profitEl = document.getElementById('profitDisplay');
    profitEl.textContent = (profit >= 0 ? '+' : '') + profit.toFixed(2);
    profitEl.className = 'value ' + (profit >= 0 ? 'green' : 'red');
}

function updateHistory() {
    const container = document.getElementById('historyDisplay');
    if (game.history.length === 0) {
        container.innerHTML = '<div style="color:#556688; text-align:center; font-size:11px;">📋 История сделок</div>';
        return;
    }
    let html = '<div style="color:#667799; font-size:10px; margin-bottom:4px;">📋 Последние сделки:</div>';
    game.history.slice(0, 10).forEach(h => {
        const icon = h.type === 'buy' ? '📈' : '📉';
        const cls = h.type === 'buy' ? 'win' : 'lose';
        const sign = h.type === 'buy' ? '-' : '+';
        const action = h.type === 'buy' ? 'Покупка' : 'Продажа';
        html += `<div class="history-item">
            <span>${icon} ${action} ${h.asset} ${h.amount.toFixed(2)} шт. по $${h.price.toFixed(2)}</span>
            <span class="${cls}">${sign}$${h.total.toFixed(2)}</span>
        </div>`;
    });
    container.innerHTML = html;
}

function showMessage(text, type = 'info') {
    const el = document.getElementById('messageDisplay');
    el.textContent = text;
    el.className = 'message ' + type;
}

// ---------- ГРАФИК ----------
function drawChart(assetId) {
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = (rect.width - 20) * dpr;
    canvas.height = (rect.height - 20) * dpr;
    canvas.style.width = (rect.width - 20) + 'px';
    canvas.style.height = (rect.height - 20) + 'px';
    ctx.scale(dpr, dpr);

    const W = canvas.width / dpr;
    const H = canvas.height / dpr;
    const a = ASSETS.find(x => x.id === assetId);
    const data = game.priceHistory[assetId] || [game.prices[assetId]];
    const price = game.prices[assetId];

    ctx.clearRect(0, 0, W, H);

    if (data.length < 2) {
        ctx.fillStyle = '#667799';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Недостаточно данных', W/2, H/2);
        return;
    }

    const minVal = Math.min(...data) * 0.998;
    const maxVal = Math.max(...data) * 1.002;
    const range = maxVal - minVal || 1;
    const padding = { top: 10, bottom: 10, left: 10, right: 10 };
    const chartW = W - padding.left - padding.right;
    const chartH = H - padding.top - padding.bottom;

    // Сетка
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 5; i++) {
        const y = padding.top + (i / 4) * chartH;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(W - padding.right, y);
        ctx.stroke();
        const val = maxVal - (i / 4) * range;
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '8px Arial';
        ctx.textAlign = 'right';
        ctx.fillText('$' + val.toFixed(a.id === 'not' ? 3 : 0), padding.left - 2, y + 3);
    }

    const points = data.map((v, i) => ({
        x: padding.left + (i / (data.length - 1)) * chartW,
        y: padding.top + chartH - ((v - minVal) / range) * chartH
    }));

    // Заливка
    ctx.beginPath();
    ctx.moveTo(points[0].x, H - padding.bottom);
    points.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(points[points.length - 1].x, H - padding.bottom);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, padding.top, 0, H - padding.bottom);
    const isUp = data[data.length - 1] >= data[0];
    grad.addColorStop(0, isUp ? 'rgba(0,255,136,0.25)' : 'rgba(255,68,85,0.25)');
    grad.addColorStop(1, 'rgba(0,255,136,0.01)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Линия
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.strokeStyle = isUp ? '#00ff88' : '#ff4455';
    ctx.lineWidth = 2;
    ctx.shadowColor = isUp ? 'rgba(0,255,136,0.2)' : 'rgba(255,68,85,0.2)';
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Текущая цена
    const lastP = points[points.length - 1];
    ctx.fillStyle = isUp ? '#00ff88' : '#ff4455';
    ctx.beginPath();
    ctx.arc(lastP.x, lastP.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = isUp ? 'rgba(0,255,136,0.4)' : 'rgba(255,68,85,0.4)';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(lastP.x, lastP.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('$' + price.toFixed(a.id === 'not' ? 3 : 2), lastP.x + 6, lastP.y - 4);
}

// ---------- МОДАЛЬНОЕ ОКНО ----------
let selectedAssetId = null;

function openModal(assetId) {
    selectedAssetId = assetId;
    game.selectedAsset = assetId;
    document.getElementById('modalOverlay').classList.add('active');
    updateModal(assetId);
}

function updateModal(assetId) {
    const a = ASSETS.find(x => x.id === assetId);
    const price = game.prices[assetId];
    const holdings = game.holdings[assetId] || 0;
    const history = game.priceHistory[assetId] || [price];
    const oldPrice = history.length > 1 ? history[history.length - 2] : price;
    const change = oldPrice !== 0 ? ((price - oldPrice) / oldPrice * 100) : 0;
    const changeClass = change >= 0 ? 'up' : 'down';
    const changeSymbol = change >= 0 ? '+' : '';
    const holdingsValue = holdings * price;

    document.getElementById('modalTitle').innerHTML = `${a.icon} ${a.name} <span style="font-size:12px; color:#667799; font-weight:normal;">${a.type}</span>`;
    document.getElementById('modalPrice').textContent = `$${price.toFixed(assetId === 'not' ? 3 : 2)}`;
    document.getElementById('modalPrice').style.color = a.color;
    document.getElementById('modalChange').textContent = `${changeSymbol}${change.toFixed(2)}%`;
    document.getElementById('modalChange').className = `current-change ${changeClass}`;
    document.getElementById('modalHoldings').textContent = holdings.toFixed(2);
    document.getElementById('modalHoldingsValue').textContent = `$${holdingsValue.toFixed(2)}`;

    document.getElementById('modalAmount').value = 1;
    updateTotalCost();
    drawChart(assetId);

    // Обновляем кнопки
    const buyBtn = document.getElementById('buyBtn');
    const sellBtn = document.getElementById('sellBtn');
    buyBtn.disabled = false;
    sellBtn.disabled = holdings <= 0;
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

function changeAmount(delta) {
    const input = document.getElementById('modalAmount');
    let val = parseFloat(input.value) || 0;
    val = Math.max(0.01, Math.round((val + delta) * 100) / 100);
    input.value = val;
    updateTotalCost();
}

function setQuickAmount(val) {
    document.getElementById('modalAmount').value = val;
    updateTotalCost();
}

function setMaxAmount() {
    const price = game.prices[selectedAssetId];
    const maxBuy = Math.floor(game.balance / price * 100) / 100;
    document.getElementById('modalAmount').value = Math.max(0.01, maxBuy);
    updateTotalCost();
}

function updateTotalCost() {
    const amount = parseFloat(document.getElementById('modalAmount').value) || 0;
    const price = game.prices[selectedAssetId];
    const total = amount * price;
    document.getElementById('modalTotalCost').textContent = total.toFixed(2);
}

// ---------- ПОКУПКА ----------
function buyAsset() {
    if (!selectedAssetId) return;
    const a = ASSETS.find(x => x.id === selectedAssetId);
    const price = game.prices[selectedAssetId];
    const amount = parseFloat(document.getElementById('modalAmount').value) || 0;
    const total = amount * price;

    if (amount <= 0) {
        showMessage('❌ Введите корректное количество', 'danger');
        return;
    }
    if (total > game.balance) {
        showMessage('❌ Недостаточно средств!', 'danger');
        return;
    }

    game.balance -= total;
    game.totalInvested += total;
    game.holdings[selectedAssetId] = (game.holdings[selectedAssetId] || 0) + amount;
    game.history.unshift({
        type: 'buy',
        asset: a.name,
        amount: amount,
        price: price,
        total: total
    });

    showMessage(`✅ Куплено ${amount.toFixed(2)} ${a.name} за $${total.toFixed(2)}`, 'success');
    saveGame();
    updateDisplay();
    updateHistory();
    updateStats();
    renderAssets();
    updateModal(selectedAssetId);
}

// ---------- ПРОДАЖА ----------
function sellAsset() {
    if (!selectedAssetId) return;
    const a = ASSETS.find(x => x.id === selectedAssetId);
    const price = game.prices[selectedAssetId];
    const amount = parseFloat(document.getElementById('modalAmount').value) || 0;
    const total = amount * price;
    const holdings = game.holdings[selectedAssetId] || 0;

    if (amount <= 0) {
        showMessage('❌ Введите корректное количество', 'danger');
        return;
    }
    if (amount > holdings) {
        showMessage(`❌ У вас только ${holdings.toFixed(2)} ${a.name}`, 'danger');
        return;
    }

    // Расчёт прибыли/убытка
    const avgPrice = game.totalInvested / (Object.values(game.holdings).reduce((a,b) => a+b, 0) || 1);
    const profit = (price - avgPrice) * amount;

    game.balance += total;
    game.totalInvested -= avgPrice * amount;
    if (game.totalInvested < 0) game.totalInvested = 0;
    game.holdings[selectedAssetId] = holdings - amount;
    if (game.holdings[selectedAssetId] < 0.001) game.holdings[selectedAssetId] = 0;

    game.history.unshift({
        type: 'sell',
        asset: a.name,
        amount: amount,
        price: price,
        total: total,
        profit: profit
    });

    showMessage(`✅ Продано ${amount.toFixed(2)} ${a.name} за $${total.toFixed(2)} ${profit >= 0 ? '📈 +' : '📉 '}${profit.toFixed(2)}`, 'success');
    saveGame();
    updateDisplay();
    updateHistory();
    updateStats();
    renderAssets();
    updateModal(selectedAssetId);
}

// ---------- СБРОС ----------
function resetGame() {
    if (confirm('Сбросить прогресс? Баланс станет 1000$, портфель очистится')) {
        game.balance = 1000;
        game.holdings = {};
        game.history = [];
        game.prices = {};
        game.priceHistory = {};
        game.totalInvested = 0;
        initPrices();
        saveGame();
        updateDisplay();
        updateHistory();
        updateStats();
        renderAssets();
        showMessage('🔄 Прогресс сброшен!', 'info');
        if (document.getElementById('modalOverlay').classList.contains('active')) {
            closeModal();
        }
    }
}

// ---------- ЗАКРЫТИЕ МОДАЛКИ ПО КЛИКУ ВНЕ ----------
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ---------- ПЕРЕРИСОВКА ГРАФИКА ----------
window.addEventListener('resize', () => {
    if (document.getElementById('modalOverlay').classList.contains('active') && selectedAssetId) {
        drawChart(selectedAssetId);
    }
});

// ---------- ЗАПУСК ----------
init();
</script>
