<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Авианосец</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a1a2e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            padding: 10px;
        }
        .game-container {
            background: #1a1a3e;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            border: 2px solid rgba(100,200,255,0.2);
        }
        .header { text-align: center; padding: 10px; border-bottom: 1px solid rgba(100,200,255,0.2); }
        .header h1 { font-size: 24px; color: #00d2ff; }
        .balance {
            background: rgba(0,200,100,0.15);
            border: 1px solid rgba(0,200,100,0.3);
            border-radius: 10px;
            padding: 8px 15px;
            display: inline-block;
            margin-top: 5px;
        }
        .balance span { color: #00ff88; font-size: 20px; font-weight: bold; }
        .bet-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .bet-control .bet-display {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc00;
            min-width: 60px;
            text-align: center;
        }
        .bet-btn {
            background: rgba(255,200,0,0.15);
            border: 1px solid rgba(255,200,0,0.3);
            color: #ffcc00;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .bet-btn:hover { background: rgba(255,200,0,0.25); }
        .bet-btn:active { transform: scale(0.95); }
        .canvas-wrapper {
            background: linear-gradient(180deg, #87CEEB, #1a3a5c);
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
            border: 2px solid rgba(100,200,255,0.3);
        }
        canvas {
            display: block;
            width: 100%;
            height: 400px;
            background: transparent;
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .game-info .info-item { text-align: center; flex: 1; min-width: 60px; }
        .game-info .info-item .label { font-size: 11px; color: #8899aa; }
        .game-info .info-item .value { font-size: 18px; font-weight: bold; color: #fff; }
        .game-info .info-item .value.green { color: #00ff88; }
        .game-info .info-item .value.yellow { color: #ffcc00; }
        .game-info .info-item .value.red { color: #ff4444; }
        .controls {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .controls button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .controls button:active { transform: scale(0.95); }
        .btn-takeoff {
            background: linear-gradient(135deg, #00b894, #00a86b);
            color: white;
        }
        .btn-takeoff:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-land {
            background: linear-gradient(135deg, #e17055, #d63031);
            color: white;
        }
        .btn-land:disabled { opacity: 0.5; cursor: not-allowed; }
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message.success { background: rgba(0,200,100,0.2); color: #00ff88; }
        .message.danger { background: rgba(255,50,50,0.2); color: #ff4444; }
        .message.info { background: rgba(100,200,255,0.15); color: #66d9ff; }
        .message.warning { background: rgba(255,200,0,0.15); color: #ffcc00; }
        .history {
            max-height: 100px;
            overflow-y: auto;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            font-size: 12px;
        }
        .history-item { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .history-item .win { color: #00ff88; }
        .history-item .lose { color: #ff4444; }
        .reset-btn {
            background: rgba(255,50,50,0.15);
            border: 1px solid rgba(255,50,50,0.3);
            color: #ff4444;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        .reset-btn:hover { background: rgba(255,50,50,0.25); }
        @media (max-width: 500px) { canvas { height: 300px; } }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>✈️ АВИАНОСЕЦ</h1>
        <div class="balance">💰 Баланс: <span id="balanceDisplay">10.00</span>$</div>
    </div>

    <div class="bet-control">
        <label>Ставка:</label>
        <button class="bet-btn" onclick="changeBet(-0.25)">−</button>
        <span class="bet-display" id="betDisplay">0.25</span>
        <button class="bet-btn" onclick="changeBet(0.25)">+</button>
        <button class="bet-btn" onclick="setBet(0.5)">0.5</button>
        <button class="bet-btn" onclick="setBet(1)">1</button>
        <button class="bet-btn" onclick="setBet(2)">2</button>
        <button class="bet-btn" onclick="setBet(5)">5</button>
        <button class="bet-btn" onclick="setBet(10)">10</button>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="500" height="400"></canvas>
    </div>

    <div class="game-info">
        <div class="info-item"><div class="label">Множитель</div><div class="value yellow" id="multiplierDisplay">1.00x</div></div>
        <div class="info-item"><div class="label">Высота</div><div class="value" id="altitudeDisplay">0м</div></div>
        <div class="info-item"><div class="label">Скорость</div><div class="value" id="speedDisplay">0</div></div>
        <div class="info-item"><div class="label">Потенц. выигрыш</div><div class="value green" id="potentialWin">0.00$</div></div>
    </div>

    <div class="controls">
        <button class="btn-takeoff" id="takeoffBtn" onclick="takeoff()">✈️ ВЗЛЕТ</button>
        <button class="btn-land" id="landBtn" onclick="land()" disabled>🛬 ПОСАДКА</button>
    </div>

    <div class="message info" id="messageDisplay">🎯 Нажми ВЗЛЕТ, чтобы начать!</div>

    <div class="history" id="historyDisplay"><div style="color:#8899aa; text-align:center;">📋 История игр</div></div>
    <button class="reset-btn" onclick="resetGame()">🔄 Сбросить прогресс</button>
</div>

<script>
// ============================================
// ВСЯ ЛОГИКА ИГРЫ
// ============================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let game = {
    balance: 10.0,
    bet: 0.25,
    multiplier: 1.0,
    altitude: 0,
    speed: 0,
    maxAltitude: 0,
    isFlying: false,
    isLanding: false,
    flightTime: 0,
    history: [],
    events: [],
    planeX: 50,
    planeY: 300,
    carrierX: 350,
    carrierY: 340,
    clouds: [],
    stars: [],
    explosionParticles: [],
    trail: [],
    gameOver: false,
    animFrame: null
};

// Сохранение баланса в браузере
function saveBalance() {
    localStorage.setItem('avia_balance', game.balance);
    localStorage.setItem('avia_history', JSON.stringify(game.history));
}

function loadBalance() {
    const saved = localStorage.getItem('avia_balance');
    if (saved !== null) game.balance = parseFloat(saved);
    const history = localStorage.getItem('avia_history');
    if (history !== null) game.history = JSON.parse(history);
}

function init() {
    loadBalance();
    createClouds();
    createStars();
    updateDisplay();
    updateHistory();
    gameLoop();
}

function createClouds() {
    game.clouds = [];
    for (let i = 0; i < 8; i++) {
        game.clouds.push({
            x: Math.random() * 600 - 100,
            y: Math.random() * 150 + 20,
            w: 40 + Math.random() * 60,
            speed: 0.2 + Math.random() * 0.3
        });
    }
}

function createStars() {
    game.stars = [];
    for (let i = 0; i < 40; i++) {
        game.stars.push({
            x: Math.random() * 500,
            y: Math.random() * 150,
            size: 0.5 + Math.random() * 1.5,
            twinkle: Math.random() * Math.PI * 2
        });
    }
}

function changeBet(amount) {
    if (game.isFlying) { showMessage('⚠️ Нельзя менять ставку в полёте!', 'warning'); return; }
    let newBet = game.bet + amount;
    newBet = Math.round(newBet * 100) / 100;
    if (newBet < 0.25) newBet = 0.25;
    if (newBet > game.balance) newBet = game.balance;
    if (newBet < 0.25) newBet = 0.25;
    game.bet = newBet;
    updateDisplay();
}

function setBet(amount) {
    if (game.isFlying) { showMessage('⚠️ Нельзя менять ставку в полёте!', 'warning'); return; }
    if (amount > game.balance) amount = game.balance;
    if (amount < 0.25) amount = 0.25;
    game.bet = amount;
    updateDisplay();
}

function takeoff() {
    if (game.isFlying) return;
    if (game.bet > game.balance) {
        showMessage('⚠️ Недостаточно средств!', 'danger');
        return;
    }

    game.balance -= game.bet;
    game.multiplier = 1.0;
    game.altitude = 0;
    game.speed = 0;
    game.flightTime = 0;
    game.isFlying = true;
    game.isLanding = false;
    game.gameOver = false;
    game.events = [];
    game.planeX = 50;
    game.planeY = 300;
    game.trail = [];
    game.explosionParticles = [];

    document.getElementById('takeoffBtn').disabled = true;
    document.getElementById('landBtn').disabled = false;

    showMessage('✈️ ВЗЛЕТАЕМ! Нажми ПОСАДКА чтобы забрать деньги!', 'success');
    updateDisplay();
}

function land() {
    if (!game.isFlying || game.isLanding) return;
    game.isLanding = true;
    showMessage('🛬 ИДЁТ НА ПОСАДКУ...', 'info');

    // Расчёт шанса успеха
    let successChance = 95 - (game.altitude / 30) - (game.speed / 2);
    let bombCount = game.events.filter(e => e.type === 'bomb').length;
    let boosterCount = game.events.filter(e => e.type === 'booster').length;
    successChance -= bombCount * 10;
    successChance += boosterCount * 5;
    successChance = Math.max(0, Math.min(95, successChance));

    const roll = Math.random() * 100;
    const winAmount = game.bet * game.multiplier;

    if (roll < successChance) {
        // УСПЕХ
        game.balance += winAmount;
        game.gameOver = true;
        game.isFlying = false;
        showMessage(`🛬 УСПЕХ! Выигрыш: ${winAmount.toFixed(2)}$`, 'success');
        createExplosion(game.planeX, game.planeY + 20, '#00ff88', 20);
        game.history.unshift({ bet: game.bet, multiplier: game.multiplier, win: winAmount, status: 'win' });
    } else if (roll < successChance + 15) {
        // АВАРИЯ (50%)
        const halfWin = winAmount / 2;
        game.balance += halfWin;
        game.gameOver = true;
        game.isFlying = false;
        showMessage(`💥 АВАРИЯ! Выигрыш: ${halfWin.toFixed(2)}$ (50%)`, 'warning');
        createExplosion(game.planeX, game.planeY, '#ff8800', 30);
        game.history.unshift({ bet: game.bet, multiplier: game.multiplier, win: halfWin, status: 'half' });
    } else {
        // КРУШЕНИЕ
        game.gameOver = true;
        game.isFlying = false;
        showMessage('💧 КРУШЕНИЕ! Всё потеряно!', 'danger');
        createExplosion(game.planeX, game.planeY, '#ff4400', 40);
        game.history.unshift({ bet: game.bet, multiplier: game.multiplier, win: 0, status: 'crash' });
    }

    if (game.history.length > 50) game.history.pop();
    document.getElementById('takeoffBtn').disabled = false;
    document.getElementById('landBtn').disabled = true;
    saveBalance();
    updateDisplay();
    updateHistory();
}

function createExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        game.explosionParticles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1,
            life: 30 + Math.random() * 30,
            maxLife: 60,
            size: 2 + Math.random() * 5,
            color
        });
    }
}

function triggerEvent() {
    if (!game.isFlying || game.isLanding) return;
    const type = Math.random() < 0.5 ? 'bomb' : 'booster';
    game.events.push({ type, time: game.flightTime });

    if (type === 'bomb') {
        game.multiplier *= 0.7;
        game.speed *= 0.8;
        showMessage('💥 БОМБА! Множитель уменьшен!', 'danger');
        createExplosion(game.planeX, game.planeY - 30, '#ff4400', 15);
    } else {
        game.multiplier *= 1.4;
        game.speed *= 1.3;
        showMessage('🚀 БУСТЕР! Множитель увеличен!', 'success');
        createExplosion(game.planeX, game.planeY - 30, '#00ff88', 10);
    }
    updateDisplay();
}

function updateDisplay() {
    document.getElementById('balanceDisplay').textContent = game.balance.toFixed(2);
    document.getElementById('betDisplay').textContent = game.bet.toFixed(2);
    document.getElementById('multiplierDisplay').textContent = game.multiplier.toFixed(2) + 'x';
    document.getElementById('altitudeDisplay').textContent = Math.round(game.altitude) + 'м';
    document.getElementById('speedDisplay').textContent = Math.round(game.speed);
    document.getElementById('potentialWin').textContent = (game.bet * game.multiplier).toFixed(2) + '$';
}

function updateHistory() {
    const container = document.getElementById('historyDisplay');
    if (game.history.length === 0) {
        container.innerHTML = '<div style="color:#8899aa; text-align:center;">📋 История игр</div>';
        return;
    }
    let html = '<div style="color:#8899aa; font-size:11px; margin-bottom:5px;">📋 Последние игры:</div>';
    game.history.slice(0, 10).forEach(h => {
        const icon = h.status === 'win' ? '✅' : h.status === 'half' ? '⚠️' : '💧';
        const cls = h.status === 'win' ? 'win' : 'lose';
        html += `<div class="history-item"><span>${icon} ${h.bet.toFixed(2)}$ × ${h.multiplier.toFixed(2)}x</span><span class="${cls}">${h.win > 0 ? '+' : ''}${h.win.toFixed(2)}$</span></div>`;
    });
    container.innerHTML = html;
}

function showMessage(text, type = 'info') {
    const el = document.getElementById('messageDisplay');
    el.textContent = text;
    el.className = 'message ' + type;
}

function resetGame() {
    if (game.isFlying) return;
    if (confirm('Сбросить прогресс? Баланс станет 10$')) {
        game.balance = 10;
        game.history = [];
        saveBalance();
        updateDisplay();
        updateHistory();
        showMessage('🔄 Прогресс сброшен!', 'info');
    }
}

// ===== РИСОВАНИЕ =====
function draw() {
    const W = 500, H = 400;
    ctx.clearRect(0, 0, W, H);

    // Небо
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.4, '#1a3a6a');
    grad.addColorStop(0.7, '#4a8aba');
    grad.addColorStop(1, '#1a3a5c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Звёзды
    game.stars.forEach(s => {
        s.twinkle += 0.02;
        ctx.globalAlpha = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkle));
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Облака
    game.clouds.forEach(c => {
        if (game.isFlying && !game.isLanding) { c.x -= c.speed * 0.5; if (c.x < -100) c.x = 600; }
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.w/2, c.w/4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x - c.w/3, c.y + 10, c.w/3, c.w/5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x + c.w/3, c.y + 8, c.w/3.5, c.w/4.5, 0, 0, Math.PI * 2);
        ctx.fill();
    });

    // Вода
    ctx.fillStyle = '#0a2a4a';
    ctx.fillRect(0, 330, W, 70);
    for (let i = 0; i < 10; i++) {
        const x = (i * 50 + Date.now() * 0.01) % 600 - 100;
        const y = 340 + Math.sin(i + Date.now() * 0.002) * 4;
        ctx.fillStyle = `rgba(60, 140, 200, 0.2)`;
        ctx.fillRect(x, y, 30, 2);
    }

    // Авианосец
    ctx.fillStyle = '#2a3a4a';
    ctx.fillRect(game.carrierX - 80, game.carrierY - 5, 160, 20);
    ctx.fillRect(game.carrierX - 60, game.carrierY - 15, 120, 10);
    ctx.fillStyle = '#3a4a5a';
    ctx.fillRect(game.carrierX - 70, game.carrierY - 8, 140, 6);
    ctx.strokeStyle = '#5a6a7a';
    ctx.setLineDash([5, 10]);
    ctx.beginPath();
    ctx.moveTo(game.carrierX - 60, game.carrierY - 5);
    ctx.lineTo(game.carrierX + 60, game.carrierY - 5);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(game.carrierX - 70, game.carrierY - 12, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#44ff44';
    ctx.beginPath();
    ctx.arc(game.carrierX + 70, game.carrierY - 12, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3a4a5a';
    ctx.fillRect(game.carrierX + 50, game.carrierY - 35, 8, 30);
    ctx.fillStyle = '#4a5a6a';
    ctx.fillRect(game.carrierX + 45, game.carrierY - 35, 18, 5);
    ctx.fillRect(game.carrierX + 45, game.carrierY - 20, 18, 5);

    // След
    game.trail.forEach((p, i) => {
        ctx.globalAlpha = i / game.trail.length * 0.5;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2 * (i / game.trail.length), 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    if (game.trail.length > 50) game.trail.shift();

    // Самолёт
    const px = game.planeX, py = game.planeY;
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(px - 15, py - 3, 30, 6);
    ctx.fillStyle = '#66ccff';
    ctx.fillRect(px + 5, py - 5, 8, 4);
    ctx.fillStyle = '#d0d0d0';
    ctx.fillRect(px - 8, py - 12, 16, 3);
    ctx.fillRect(px - 8, py + 9, 16, 3);
    ctx.fillRect(px - 18, py - 8, 5, 16);
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(px - 20, py - 1, 6, 2);
    if (game.isFlying && !game.isLanding) {
        ctx.fillStyle = '#ff4400';
        ctx.fillRect(px - 25, py - 2, 5, 4);
        ctx.fillStyle = 'rgba(255, 100, 0, 0.3)';
        ctx.fillRect(px - 30, py - 4, 8, 8);
    }

    // Взрывы
    game.explosionParticles = game.explosionParticles.filter(p => p.life > 0);
    game.explosionParticles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Инфо на канвасе
    if (game.isFlying && !game.isLanding) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(10, 10, 120, 55);
        ctx.fillStyle = '#fff';
        ctx.font = '12px Arial';
        ctx.fillText('✈️ В ПОЛЁТЕ', 20, 28);
        ctx.fillText(`⏱ ${game.flightTime.toFixed(1)}с`, 20, 46);
        ctx.fillText(`📈 ${game.multiplier.toFixed(2)}x`, 20, 64);
    }
}

function gameLoop(timestamp) {
    const delta = game.lastTime ? (timestamp - game.lastTime) / 1000 : 0;
    game.lastTime = timestamp;

    if (game.isFlying && !game.isLanding && !game.gameOver) {
        game.flightTime += delta;
        if (game.flightTime < 3) game.multiplier += delta * 0.1;
        else if (game.flightTime < 8) game.multiplier += delta * 0.15;
        else game.multiplier += delta * 0.25;
        game.speed += delta * 2;
        game.altitude += game.speed * delta * 5;
        game.planeX += delta * (30 + game.speed * 2);
        game.planeY = 300 - game.altitude * 0.3;
        game.planeY = Math.max(30, Math.min(370, game.planeY));
        game.trail.push({x: game.planeX, y: game.planeY});

        if (game.planeX > 520) {
            game.isFlying = false;
            game.gameOver = true;
            document.getElementById('takeoffBtn').disabled = false;
            document.getElementById('landBtn').disabled = true;
            showMessage('💧 САМОЛЁТ УПАЛ В ВОДУ!', 'danger');
            createExplosion(500, game.planeY, '#ff4400', 30);
            saveBalance();
            updateDisplay();
        }

        if (Math.random() < 0.008 && game.flightTime > 2) triggerEvent();
        updateDisplay();
    }

    if (!game.isFlying || game.isLanding) {
        game.clouds.forEach(c => { c.x += c.speed * 0.1; if (c.x > 600) c.x = -100; });
    }

    draw();
    game.animFrame = requestAnimationFrame(gameLoop);
}

init();
</script>
